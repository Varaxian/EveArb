[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "eve-arb-db"
version = "2.0.1"
requires-python = ">=3.11"
dependencies = ["sqlalchemy>=2.0", "psycopg[binary]>=3.2"]

[tool.setuptools]
package-dir = {"" = "."}

[tool.setuptools.packages.find]
where = ["."]
include = ["packages.db*"]
