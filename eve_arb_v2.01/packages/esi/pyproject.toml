[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "eve-arb-esi"
version = "2.0.1"
requires-python = ">=3.11"
dependencies = ["httpx>=0.28", "tenacity>=9.0"]

[tool.setuptools]
package-dir = {"" = "."}

[tool.setuptools.packages.find]
where = ["."]
include = ["packages.esi*"]
