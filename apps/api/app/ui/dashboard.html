<!doctype html>
<html><head><meta charset="utf-8"><title>EVE Arb Dashboard</title><meta name="viewport" content="width=device-width, initial-scale=1">
<style>body{font-family:Arial,sans-serif;margin:20px;background:#111827;color:#e5e7eb}.nav{display:flex;gap:12px;margin-bottom:20px}.nav a{color:#93c5fd;text-decoration:none;padding:8px 12px;border:1px solid #374151;border-radius:8px}.card{background:#1f2937;border-radius:10px;padding:16px;margin-bottom:16px}.mono{font-family:ui-monospace,monospace;white-space:pre-wrap;font-size:12px}</style></head>
<body>
<div class="nav"><a href="/dashboard">Dashboard</a><a href="/active-opportunities">Active Opportunities</a><a id="adminNav" href="/admin" style="display:none;">Admin</a></div>
<h1>EVE Arb v2.20 Dashboard</h1>
<div class="card"><p>This page is now user-facing only. Admin controls moved to <code>/admin</code>.</p><button onclick="loadMe()">Refresh Account</button><pre id="me" class="mono"></pre></div>
<div class="card"><p>Use the API/UI already in place for opportunities. This split locks structure first.</p><ul><li><a href="/market/opportunities?src_region_id=10000002&dst_region_id=10000043">Sample opportunities API</a></li><li><a href="/opportunities/active">Your active opportunities API</a></li></ul></div>
<script>async function loadMe(){const r=await fetch('/app/me'); if(r.status===401){document.getElementById('me').textContent='Not authenticated'; return;} const data=await r.json(); document.getElementById('me').textContent=JSON.stringify(data,null,2); if(data.user && ['admin','super_admin'].includes(data.user.role)){document.getElementById('adminNav').style.display='inline-block';}} loadMe();</script>
</body></html>
