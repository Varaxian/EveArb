<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>EVE Arb Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #111827; color: #e5e7eb; }
    .row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
    .card { background: #1f2937; border-radius: 10px; padding: 16px; min-width: 280px; flex: 1; }
    input, button, textarea, select { padding: 8px; margin: 4px 0; border-radius: 6px; border: 1px solid #374151; background: #0f172a; color: #e5e7eb; width: 100%; box-sizing: border-box; }
    button { cursor: pointer; width: auto; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th, td { border-bottom: 1px solid #374151; padding: 8px; text-align: left; font-size: 14px; }
    a { color: #93c5fd; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; white-space: pre-wrap; font-size: 12px; }
    .inline { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .inline > div { min-width: 120px; flex: 1; }
    .status { padding: 10px; border-radius: 8px; background: #0f172a; margin-bottom: 16px; }
  </style>
</head>
<body>
  <h1>EVE Arb v2.07 Dashboard</h1>

  <div class="status" id="authStatus">Checking authentication...</div>

  <div class="row">
    <div class="card">
      <h3>Account</h3>
      <button onclick="login()">Connect EVE</button>
      <button onclick="logout()">Logout</button>
      <button onclick="refreshToken()">Refresh token</button>
      <div id="meResult" class="mono"></div>
    </div>
    <div class="card">
      <h3>Manual ingest</h3>
      <button onclick="runIngest()">Run ingest now</button>
      <div id="ingestResult" class="mono"></div>
    </div>
    <div class="card">
      <h3>Scheduler</h3>
      <button onclick="loadScheduler()">Refresh scheduler status</button>
      <button onclick="runScheduler()">Run scheduler cycle now</button>
      <div id="schedulerResult" class="mono"></div>
    </div>
    <div class="card">
      <h3>Auth sessions</h3>
      <button onclick="loadSessions()">Refresh sessions</button>
      <div id="sessionsResult" class="mono"></div>
    </div>
  </div>

  <div class="row">
    <div class="card">
      <h3>Platform tracked regions</h3>
      <label>Comma-separated region IDs</label>
      <input id="trackedRegions" value="10000002,10000043">
      <button onclick="saveTrackedRegions()">Save tracked regions</button>
      <div id="trackedRegionsResult" class="mono"></div>
    </div>
    <div class="card">
      <h3>Platform hub systems</h3>
      <label>JSON mapping of region → hub system</label>
      <textarea id="hubSystems" rows="6">{}</textarea>
      <button onclick="saveHubSystems()">Save hub systems</button>
      <div id="hubSystemsResult" class="mono"></div>
    </div>
  </div>

  <div class="row">
    <div class="card">
      <h3>Your dashboard filters</h3>
      <div class="inline">
        <div><label>Source region ID</label><input id="srcRegion" value="10000002"></div>
        <div><label>Destination region ID</label><input id="dstRegion" value="10000043"></div>
        <div><label>Minimum ROI</label><input id="minRoi" value="0.03"></div>
        <div><label>Minimum Qty</label><input id="minQty" value="10"></div>
        <div><label>Min Net Profit</label><input id="minNetProfit" value="0"></div>
        <div><label>Max Total m3</label><input id="maxTotalM3" value="0"></div>
        <div><label>Max Jumps</label><input id="maxJumps" value="0"></div>
        <div><label>Route Security</label>
          <select id="routeSecurityMode">
            <option value="any">Any</option>
            <option value="highsec_only">High-sec only</option>
            <option value="no_null">No null</option>
            <option value="lowsec_allowed">Low-sec allowed</option>
            <option value="nullsec_allowed">Null-sec allowed</option>
          </select>
        </div>
        <div><label>Min System Security</label><input id="minSystemSecurity" value="0.0"></div>
        <div><label>Limit</label><input id="limit" value="50"></div>
      </div>
      <button onclick="saveFilters()">Save my filters</button>
      <button onclick="loadOpportunities()">Load opportunities</button>
      <button onclick="downloadCsv()">Download CSV</button>
      <div id="filtersResult" class="mono"></div>
    </div>
  </div>

  <div class="card">
    <h3>Route Analysis</h3>
    <div class="inline">
      <div><label>From system</label><input id="routeFromSystem" value="30000142"></div>
      <div><label>To system</label><input id="routeToSystem" value="30002187"></div>
    </div>
    <button onclick="analyzeRoute()">Analyze route</button>
    <div id="routeResult" class="mono"></div>
  </div>

  <div class="card">
    <h3>Opportunities</h3>
    <div id="opportunitiesMeta" class="mono"></div>
    <table id="oppTable">
      <thead>
        <tr>
          <th>Type</th>
          <th>Name</th>
          <th>Sell</th>
          <th>Buy</th>
          <th>Profit/Unit</th>
          <th>ROI</th>
          <th>Qty</th>
          <th>Jumps</th>
          <th>Security</th>
          <th>Total m3</th>
          <th>Net Profit</th>
          <th>Profit/m3</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

<script>
function currentFilters() {
  return {
    src_region_id: document.getElementById('srcRegion').value,
    dst_region_id: document.getElementById('dstRegion').value,
    min_roi: document.getElementById('minRoi').value,
    min_qty: document.getElementById('minQty').value,
    min_net_profit_isk: document.getElementById('minNetProfit').value,
    max_total_m3: document.getElementById('maxTotalM3').value,
    max_jumps: document.getElementById('maxJumps').value,
    route_security_mode: document.getElementById('routeSecurityMode').value,
    min_system_security: document.getElementById('minSystemSecurity').value,
    limit: document.getElementById('limit').value
  };
}
function qp() {
  return new URLSearchParams(currentFilters());
}
function login() { window.location = '/auth/login?next_path=/dashboard'; }
async function logout() { await fetch('/auth/logout', { method: 'POST' }); window.location = '/dashboard'; }

async function refreshToken() {
  const el = document.getElementById('meResult');
  const r = await fetch('/auth/refresh', { method: 'POST' });
  const data = await r.json();
  el.textContent = JSON.stringify(data, null, 2);
  await loadMe();
}

async function loadMe() {
  const status = document.getElementById('authStatus');
  const el = document.getElementById('meResult');
  const r = await fetch('/app/me');
  if (r.status === 401) {
    status.textContent = 'Not authenticated. Connect your EVE character to unlock per-user settings and token refresh.';
    el.textContent = '';
    return;
  }
  const data = await r.json();
  status.textContent = `Authenticated as user #${data.user.id} with ${data.characters.length} linked character(s).`;
  el.textContent = JSON.stringify(data, null, 2);
}

async function loadSettings() {
  const r = await fetch('/settings');
  if (r.status === 401) return;
  const data = await r.json();
  document.getElementById('trackedRegions').value = (data.tracked_regions || []).join(',');
  document.getElementById('hubSystems').value = JSON.stringify(data.region_hub_systems || {}, null, 2);
  const f = data.dashboard_filters || {};
  document.getElementById('minRoi').value = f.min_roi ?? 0.03;
  document.getElementById('minQty').value = f.min_qty ?? 10;
  document.getElementById('minNetProfit').value = f.min_net_profit_isk ?? 0;
  document.getElementById('maxTotalM3').value = f.max_total_m3 ?? 0;
  document.getElementById('maxJumps').value = f.max_jumps ?? 0;
  document.getElementById('routeSecurityMode').value = f.route_security_mode ?? 'any';
  document.getElementById('minSystemSecurity').value = f.min_system_security ?? 0.0;
  document.getElementById('limit').value = f.limit ?? 50;
}

async function saveTrackedRegions() {
  const el = document.getElementById('trackedRegionsResult');
  const tracked_regions = document.getElementById('trackedRegions').value.split(',').map(x => Number(x.trim())).filter(Boolean);
  const r = await fetch('/settings/platform', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ tracked_regions }) });
  el.textContent = JSON.stringify(await r.json(), null, 2);
}
async function saveHubSystems() {
  const el = document.getElementById('hubSystemsResult');
  const region_hub_systems = JSON.parse(document.getElementById('hubSystems').value);
  const r = await fetch('/settings/platform/hubs', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ region_hub_systems }) });
  el.textContent = JSON.stringify(await r.json(), null, 2);
}
async function saveFilters() {
  const el = document.getElementById('filtersResult');
  const payload = {
    min_roi: Number(document.getElementById('minRoi').value),
    min_qty: Number(document.getElementById('minQty').value),
    min_net_profit_isk: Number(document.getElementById('minNetProfit').value),
    max_total_m3: Number(document.getElementById('maxTotalM3').value),
    max_jumps: Number(document.getElementById('maxJumps').value),
    route_security_mode: document.getElementById('routeSecurityMode').value,
    min_system_security: Number(document.getElementById('minSystemSecurity').value),
    limit: Number(document.getElementById('limit').value),
  };
  const r = await fetch('/settings/filters', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
  el.textContent = JSON.stringify(await r.json(), null, 2);
}
async function runIngest() {
  const el = document.getElementById('ingestResult');
  el.textContent = 'Running...';
  const r = await fetch('/market/ingest', { method: 'POST' });
  el.textContent = JSON.stringify(await r.json(), null, 2);
}
async function runScheduler() {
  const el = document.getElementById('schedulerResult');
  el.textContent = 'Running...';
  const r = await fetch('/scheduler/run', { method: 'POST' });
  el.textContent = JSON.stringify(await r.json(), null, 2);
}
async function loadScheduler() {
  const el = document.getElementById('schedulerResult');
  const r = await fetch('/scheduler/status');
  el.textContent = JSON.stringify(await r.json(), null, 2);
}
async function loadSessions() {
  const el = document.getElementById('sessionsResult');
  const r = await fetch('/auth/sessions');
  if (r.status === 401) { el.textContent = 'Login required'; return; }
  el.textContent = JSON.stringify(await r.json(), null, 2);
}
async function analyzeRoute() {
  const from = document.getElementById('routeFromSystem').value;
  const to = document.getElementById('routeToSystem').value;
  const r = await fetch(`/logistics/route?from_system=${from}&to_system=${to}`);
  document.getElementById('routeResult').textContent = JSON.stringify(await r.json(), null, 2);
}
async function loadOpportunities() {
  const r = await fetch('/market/opportunities?' + qp().toString());
  const data = await r.json();
  document.getElementById('opportunitiesMeta').textContent = `Rows: ${data.length}`;
  const tbody = document.querySelector('#oppTable tbody');
  tbody.innerHTML = '';
  for (const row of data) {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${row.type_id ?? ''}</td>
      <td>${row.item_name ?? ''}</td>
      <td>${Number(row.src_best_sell ?? 0).toLocaleString()}</td>
      <td>${Number(row.dst_best_buy ?? 0).toLocaleString()}</td>
      <td>${Number(row.profit_per_unit ?? 0).toLocaleString()}</td>
      <td>${((row.roi ?? 0) * 100).toFixed(2)}%</td>
      <td>${Number(row.max_qty_est ?? 0).toLocaleString()}</td>
      <td>${row.route_jumps ?? ''}</td>
      <td>${row.route_security_profile ?? ''}</td>
      <td>${Number(row.total_m3 ?? 0).toLocaleString()}</td>
      <td>${Number(row.net_profit_isk ?? 0).toLocaleString()}</td>
      <td>${row.profit_per_m3 == null ? '' : Number(row.profit_per_m3).toLocaleString()}</td>
    `;
    tbody.appendChild(tr);
  }
}
function downloadCsv() { window.location = '/export/opportunities.csv?' + qp().toString(); }

loadMe();
loadSettings();
loadScheduler();
loadSessions();
</script>
</body>
</html>
