
<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Administrator Settings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #111827; color: #e5e7eb; }
    .row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
    .card { background: #1f2937; border-radius: 10px; padding: 16px; min-width: 280px; flex: 1; }
    input, button, textarea { padding: 8px; margin: 4px 0; border-radius: 6px; border: 1px solid #374151; background: #0f172a; color: #e5e7eb; width: 100%; box-sizing: border-box; }
    button { cursor: pointer; width: auto; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; white-space: pre-wrap; font-size: 12px; }
    .nav { display:flex; gap:16px; margin-bottom:16px; }
    a { color:#93c5fd; text-decoration:none; }
  </style>
</head>
<body>
  <h1>Administrator Settings</h1>
  <div class="nav">
    <a href="/dashboard">Dashboard</a>
    <a href="/active-opportunities">Active Opportunities</a>
    <a href="/administrator-settings">Administrator Settings</a>
  </div>
  <div id="authStatus" class="mono"></div>

  <div class="row">
    <div class="card">
      <h3>Manual Ingest</h3>
      <button onclick="runIngest()">Run ingest now</button>
      <div id="ingestResult" class="mono"></div>
    </div>
    <div class="card">
      <h3>Scheduler</h3>
      <button onclick="loadScheduler()">Refresh scheduler status</button>
      <button onclick="runScheduler()">Run scheduler cycle now</button>
      <div id="schedulerResult" class="mono"></div>
    </div>
    <div class="card">
      <h3>Auth Sessions</h3>
      <button onclick="loadSessions()">Refresh sessions</button>
      <div id="sessionsResult" class="mono"></div>
    </div>
  </div>

  <div class="row">
    <div class="card">
      <h3>Platform Tracked Regions</h3>
      <input id="trackedRegions" value="10000002,10000043">
      <button onclick="saveTrackedRegions()">Save tracked regions</button>
      <div id="trackedRegionsResult" class="mono"></div>
    </div>
    <div class="card">
      <h3>Platform Hub Systems</h3>
      <textarea id="hubSystems" rows="10">{}</textarea>
      <button onclick="saveHubSystems()">Save hub systems</button>
      <div id="hubSystemsResult" class="mono"></div>
    </div>
  </div>

  <div class="card">
    <h3>Admin Audit Log</h3>
    <button onclick="loadAuditLogs()">Refresh audit log</button>
    <div id="auditResult" class="mono"></div>
  </div>

<script>
async function loadMe() {
  const r = await fetch('/app/me');
  if (r.status !== 200) { window.location = '/auth/login?next_path=/administrator-settings'; return; }
  const data = await r.json();
  if (!data.user.is_admin) { window.location = '/dashboard'; return; }
  document.getElementById('authStatus').textContent = `Administrator access: ${data.user.handle} (${data.user.role})`;
}
async function loadSettings() {
  const r = await fetch('/settings');
  const data = await r.json();
  document.getElementById('trackedRegions').value = (data.tracked_regions || []).join(',');
  document.getElementById('hubSystems').value = JSON.stringify(data.region_hub_systems || {}, null, 2);
}
async function runIngest() {
  const el = document.getElementById('ingestResult'); el.textContent = 'Running...';
  const r = await fetch('/market/ingest', { method:'POST' }); el.textContent = JSON.stringify(await r.json(), null, 2);
}
async function loadScheduler() {
  const el = document.getElementById('schedulerResult');
  const r = await fetch('/scheduler/status'); el.textContent = JSON.stringify(await r.json(), null, 2);
}
async function runScheduler() {
  const el = document.getElementById('schedulerResult');
  const r = await fetch('/scheduler/run', { method:'POST' }); el.textContent = JSON.stringify(await r.json(), null, 2);
}
async function loadSessions() {
  const el = document.getElementById('sessionsResult');
  const r = await fetch('/auth/sessions'); el.textContent = JSON.stringify(await r.json(), null, 2);
}
async function saveTrackedRegions() {
  const tracked_regions = document.getElementById('trackedRegions').value.split(',').map(x => Number(x.trim())).filter(Boolean);
  const r = await fetch('/settings/platform', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ tracked_regions }) });
  document.getElementById('trackedRegionsResult').textContent = JSON.stringify(await r.json(), null, 2);
}
async function saveHubSystems() {
  const region_hub_systems = JSON.parse(document.getElementById('hubSystems').value);
  const r = await fetch('/settings/platform/hubs', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ region_hub_systems }) });
  document.getElementById('hubSystemsResult').textContent = JSON.stringify(await r.json(), null, 2);
}
async function loadAuditLogs() {
  const r = await fetch('/scheduler/audit-logs');
  document.getElementById('auditResult').textContent = JSON.stringify(await r.json(), null, 2);
}
loadMe(); loadSettings(); loadScheduler(); loadAuditLogs();
</script>
</body>
</html>
