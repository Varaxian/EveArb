<!doctype html>
<html><head><meta charset="utf-8"><title>Admin</title><meta name="viewport" content="width=device-width, initial-scale=1">
<style>body{font-family:Arial,sans-serif;margin:20px;background:#111827;color:#e5e7eb}.nav{display:flex;gap:12px;margin-bottom:20px}.nav a{color:#93c5fd;text-decoration:none;padding:8px 12px;border:1px solid #374151;border-radius:8px}.card{background:#1f2937;border-radius:10px;padding:16px;margin-bottom:16px}.mono{font-family:ui-monospace,monospace;white-space:pre-wrap;font-size:12px}button{padding:8px 12px;margin-right:8px}</style></head>
<body>
<div class="nav"><a href="/dashboard">Dashboard</a><a href="/active-opportunities">Active Opportunities</a><a href="/admin">Admin</a></div>
<h1>Admin</h1>
<div class="card"><button onclick="loadUsers()">Users</button><button onclick="loadSessions()">Sessions</button><button onclick="loadScheduler()">Scheduler Status</button><button onclick="runIngest()">Run Ingest</button><button onclick="restartScheduler()">Restart Scheduler</button><pre id="out" class="mono"></pre></div>
<script>async function guard(){const r=await fetch('/app/me'); if(r.status===401){document.getElementById('out').textContent='Not authenticated'; return false;} const data=await r.json(); if(!['admin','super_admin'].includes(data.user.role)){document.getElementById('out').textContent='Admin access required'; return false;} return true;} async function loadUsers(){if(!await guard()) return; const r=await fetch('/admin/users'); document.getElementById('out').textContent=JSON.stringify(await r.json(),null,2);} async function loadSessions(){if(!await guard()) return; const r=await fetch('/admin/sessions'); document.getElementById('out').textContent=JSON.stringify(await r.json(),null,2);} async function loadScheduler(){if(!await guard()) return; const r=await fetch('/admin/scheduler/status'); document.getElementById('out').textContent=JSON.stringify(await r.json(),null,2);} async function runIngest(){if(!await guard()) return; const r=await fetch('/admin/ingest/run',{method:'POST'}); document.getElementById('out').textContent=JSON.stringify(await r.json(),null,2);} async function restartScheduler(){if(!await guard()) return; const r=await fetch('/admin/scheduler/restart',{method:'POST'}); document.getElementById('out').textContent=JSON.stringify(await r.json(),null,2);} guard();</script>
</body></html>
